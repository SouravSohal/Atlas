version: '3.8'

services:
  atlas-api:
    container_name: atlas-api
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8080:8000"
    env_file:
      - .env.docker
    restart: unless-stopped
    healthcheck:
      # Leverage Python's standard library to perform HTTP checks since curl/wget are missing in slim images
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
